---
# Student Feedback System - Ansible Deployment Playbook
# Handles: Docker installation, image build, container deployment

- name: Deploy Student Feedback System
  hosts: local
  become: yes
  vars:
    image_name: student-feedback-system
    container_name: student-feedback-app
    app_port: 5000
    project_dir: "{{ playbook_dir }}/.."

  tasks:

    # ---- Step 1: Ensure Docker is installed ----
    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present
      when: ansible_os_family == "Debian"

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present
      when: ansible_os_family == "Debian"

    - name: Install Docker Engine
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    # ---- Step 2: Build Docker image ----
    - name: Build Docker image from project directory
      community.docker.docker_image:
        name: "{{ image_name }}"
        tag: latest
        source: build
        build:
          path: "{{ project_dir }}"
        force_source: yes

    # ---- Step 3: Stop and remove existing container (if any) ----
    - name: Stop existing container
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: yes

    # ---- Step 4: Run new container ----
    - name: Run Student Feedback System container
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}:latest"
        state: started
        restart_policy: always
        ports:
          - "{{ app_port }}:5000"

    # ---- Step 5: Verify deployment ----
    - name: Wait for application to be ready
      uri:
        url: "http://localhost:{{ app_port }}"
        status_code: 200
      register: result
      retries: 5
      delay: 3
      until: result.status == 200

    - name: Deployment success message
      debug:
        msg: "✅ Student Feedback System is live at http://localhost:{{ app_port }}"
